<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 15px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        .logo i {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .api-section {
            margin-top: 100px;
            padding: 40px 0;
        }

        .api-card {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.1);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .chat-container {
            display: none;
            margin-top: 100px;
            height: calc(100vh - 100px);
            padding: 20px 0;
        }

        .chat-box {
            height: calc(100vh - 300px);
            padding: 30px;
            border-radius: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .message {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 16px;
            max-width: 80%;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-left: auto;
            text-align: right;
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-right: auto;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0.8;
        }

        .user-message .message-header {
            justify-content: flex-end;
        }

        .message-content {
            line-height: 1.6;
            font-size: 15px;
        }

        .input-section {
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            max-width: 800px;
            margin: 0 auto;
        }

        .input-group .form-control {
            border-right: none;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }

        .input-group .btn {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            padding: 15px 25px;
        }

        .typing-indicator {
            display: none;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            max-width: 200px;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            30% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .status-indicator {
            position: fixed;
            top: 120px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .status-connected {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
        }

        @media (max-width: 768px) {
            .message {
                max-width: 95%;
                padding: 15px;
            }

            .api-card {
                margin: 20px;
                padding: 20px;
            }

            .logo {
                font-size: 24px;
            }

            .chat-box {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-particles" id="particles"></div>

    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>Smart Student</span>
                <i class="material-icons">school</i>
            </div>
        </div>
    </header>

    <div class="status-indicator" id="statusIndicator" style="display: none;">
        <i class="fas fa-circle"></i>
        <span id="statusText">Connecting...</span>
    </div>

    <div class="chat-container" id="chatContainer" style="display: block;">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="chat-box glass" id="chatBox">
                        <div class="message bot-message">
                            <div class="message-header">
                                <i class="fas fa-robot"></i>
                                <span>Smart Student AI</span>
                            </div>
                            <div class="message-content">
                                Hello! I'm your Smart Student AI assistant. I'm here to help you with your studies, homework, research, and learning journey. Ask me anything about academics, and I'll do my best to help you succeed!
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="input-section">
            <div class="container">
                <div class="input-group">
                    <input type="text" class="form-control" id="messageInput" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary" type="button" onclick="sendMessage()">
                        <i class="material-icons">send</i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
    let apiKey = 'AIzaSyD1b4oIw0KO85jp7BLrXv99eSZUTt1xJL4';
    let isConnected = false;

    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            const left = Math.random() * 100;
            const delay = Math.random() * 20;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = left + '%';
            particle.style.animationDelay = delay + 's';
            particlesContainer.appendChild(particle);
        }
    }

    function showStatus(message, isError = false) {
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        statusIndicator.style.display = 'flex';
        statusIndicator.className = `status-indicator ${isError ? 'status-error' : 'status-connected'}`;
        statusText.textContent = message;
        if (!isError) {
            setTimeout(() => {
                statusIndicator.style.display = 'none';
            }, 3000);
        }
    }

    function connectToGemini() {
        const apiKeyInput = document.getElementById('apiKey');
        const inputValue = apiKeyInput.value.trim();
        if (!inputValue) {
            showStatus('Please enter your API key', true);
            return;
        }
        if (!inputValue.startsWith('AIza')) {
            showStatus('Invalid API key format', true);
            return;
        }
        apiKey = inputValue;
        isConnected = true;
        document.getElementById('apiSection').style.display = 'none';
        document.getElementById('chatContainer').style.display = 'block';
        showStatus('Connected to Smart Student AI');
        document.getElementById('messageInput').focus();
    }

    function addMessage(content, isUser = false) {
        const chatBox = document.getElementById('chatBox');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        const headerDiv = document.createElement('div');
        headerDiv.className = 'message-header';
        headerDiv.innerHTML = isUser ?
            '<i class="fas fa-user"></i><span>You</span>' :
            '<i class="fas fa-robot"></i><span>Smart Student AI</span>';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = content.replace(/\n/g, '<br>');
        messageDiv.appendChild(headerDiv);
        messageDiv.appendChild(contentDiv);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        const typingIndicator = document.getElementById('typingIndicator');
        const chatBox = document.getElementById('chatBox');
        chatBox.appendChild(typingIndicator);
        typingIndicator.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTyping() {
        const typingIndicator = document.getElementById('typingIndicator');
        typingIndicator.style.display = 'none';
    }

    async function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();
        if (!message) return;

        addMessage(message, true);
        messageInput.value = '';
        showTyping();

        try {
            const response = await fetch(
                "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [{ text: message }]
                            }
                        ]
                    })
                }
            );

            const data = await response.json();
            hideTyping();

            if (data.candidates && data.candidates.length > 0) {
                const botReply = data.candidates[0].content.parts[0].text;
                addMessage(botReply);
            } else {
                addMessage("⚠️ No response received. Check API key or request format.");
            }
        } catch (error) {
            hideTyping();
            addMessage("❌ Error connecting to Gemini API: " + error.message);
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    window.addEventListener('load', function () {
        createParticles();
        document.getElementById('messageInput').focus();
    });
</script>
</body>
</html>
